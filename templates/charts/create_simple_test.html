{% extends "base.html" %}
{% block content %}
<div class="page-header" style="margin-bottom: 15px;">
    <h2 style="margin: 0;">Create Chart - Simple Test</h2>
</div>

<form method="POST" style="max-width: 600px;" id="chartForm">
    <input type="hidden" name="pattern_id" value="{{ pattern_id }}">
    
    <div style="margin-bottom: 8px;">
        <label for="piece_id" style="display: block; margin-bottom: 3px;">Piece:</label>
        <select id="piece_id" name="piece_id" style="width: 200px; padding: 4px 8px;" required>
            <option value="">Select Piece</option>
            {% for piece in pieces %}
            <option value="{{ piece.id }}">{{ piece.name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div style="margin-bottom: 8px;">
        <label for="name" style="display: block; margin-bottom: 3px;">Chart Name:</label>
        <input type="text" id="name" name="name" style="width: 400px; padding: 4px 8px;" required value="">
    </div>
    
    <div style="margin-bottom: 8px;">
        <label for="num_rows" style="display: block; margin-bottom: 3px;">Rows:</label>
        <input type="number" id="num_rows" name="num_rows" min="1" style="width: 80px; padding: 4px 8px;" value="10" required>
    </div>
    
    <div style="margin-bottom: 8px;">
        <label for="num_columns" style="display: block; margin-bottom: 3px;">Columns:</label>
        <input type="number" id="num_columns" name="num_columns" min="1" style="width: 80px; padding: 4px 8px;" value="10" required>
    </div>
    
    <div style="margin-bottom: 15px;">
        <button type="submit" id="submit-btn" style="padding: 8px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px;">Create Chart</button>
        <a href="/charts" style="margin-left: 10px; padding: 8px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 4px;">Cancel</a>
    </div>
</form>

<script>
alert('IMMEDIATE ALERT - Script is loading');

document.addEventListener('DOMContentLoaded', function() {
    alert('DOM LOADED - JavaScript is working');
    
    const pieceSelect = document.getElementById('piece_id');
    const nameInput = document.getElementById('name');
    
    if (pieceSelect && nameInput) {
        alert('Elements found successfully');
        
        pieceSelect.addEventListener('change', function() {
            alert('Piece selection changed: ' + this.value);
            
            const selectedOption = this.options[this.selectedIndex];
            const pieceName = selectedOption.text;
            
            if (this.value && pieceName !== 'Select Piece') {
                const chartName = 'Chart for ' + pieceName;
                nameInput.value = chartName;
                alert('Chart name set to: ' + chartName);
            } else {
                nameInput.value = '';
                alert('Chart name cleared');
            }
        });
    } else {
        alert('ERROR: Could not find required elements');
    }
});
</script>

{% endblock %}
