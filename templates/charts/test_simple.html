<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Test</title>
</head>
<body>
    <h1>JavaScript Test Page</h1>
    <select id="piece_id">
        <option value="">Select Piece</option>
        <option value="1">Test Piece</option>
    </select>
    <input type="text" id="name" placeholder="Chart Name">
    
    <script>
        alert('IMMEDIATE TEST - JavaScript loading');
        
        document.addEventListener('DOMContentLoaded', function() {
            alert('DOM READY TEST');
            
            const pieceSelect = document.getElementById('piece_id');
            const nameInput = document.getElementById('name');
            
            if (pieceSelect && nameInput) {
                alert('Elements found successfully');
                
                pieceSelect.addEventListener('change', function() {
                    alert('Piece changed to: ' + this.value);
                    nameInput.value = 'Test Chart Name';
                    alert('Name input value set to: ' + nameInput.value);
                });
            } else {
                alert('ERROR: Elements not found - piece: ' + !!pieceSelect + ', name: ' + !!nameInput);
            }
        });
    </script>
</body>
</html>
