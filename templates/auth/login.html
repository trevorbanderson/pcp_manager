<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – PCP Pattern Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 40px 48px; width: 100%; max-width: 420px; }
        .login-card h2 { margin: 0 0 8px; font-size: 24px; color: #333; }
        .login-card p.subtitle { color: #888; margin: 0 0 28px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; color: #444; }
        .form-group input { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.15); }
        .btn-login { width: 100%; padding: 10px; background: #3498db; color: #fff; border: none; border-radius: 5px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; }
        .btn-login:hover { background: #2980b9; }
        .alert { padding: 10px 14px; border-radius: 5px; margin-bottom: 18px; font-size: 13px; }
        .alert-error { background: #fdecea; color: #c0392b; border: 1px solid #f5c6cb; }
        .alert-info  { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        #loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.55); z-index:9999; align-items:center; justify-content:center; }
        #loading-overlay.active { display:flex; }
        .spinner { width:52px; height:52px; border:6px solid #dde; border-top-color:#3498db; border-radius:50%; animation:spin 0.75s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div></div>
    <div class="login-card">
        <h2>PCP Pattern Manager</h2>
        <p class="subtitle">Sign in to your account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
    <script>
        document.querySelector('form').addEventListener('submit', function () {
            document.getElementById('loading-overlay').classList.add('active');
            document.body.style.cursor = 'wait';
        });
    </script>
</body>
</html>
