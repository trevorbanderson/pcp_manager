{% extends "base.html" %}

{% block title %}Add Pattern Chart{% endblock %}

{% block content %}
<div style="margin-bottom: 15px;">
    <h2 style="margin: 0; display: inline-block;">Add Pattern Chart</h2>
    <a href="{{ url_for('pattern_charts_list') }}" class="btn btn-secondary" style="float: right;">Back to List</a>
</div>

<form method="POST">
    <div style="margin-bottom: 8px;">
        <label for="pattern_id" style="display: block; margin-bottom: 3px;">Pattern:</label>
        <select id="pattern_id" name="pattern_id" required style="padding: 4px 8px; width: 300px;">
            <option value="">Select a pattern...</option>
            {% for pattern in patterns %}
            <option value="{{ pattern['id'] }}" {% if selected_pattern_id == pattern['id']|string %}selected{% endif %}>{{ pattern['name'] }}</option>
            {% endfor %}
        </select>
        <script>
        document.getElementById('pattern_id').onchange = function() {
            window.location = '?pattern_id=' + this.value;
        };
        </script>
    </div>

    <div style="margin-bottom: 8px;">
        <label for="chart_id" style="display: block; margin-bottom: 3px;">Chart:</label>
        <select id="chart_id" name="chart_id" required style="padding: 4px 8px; width: 300px;">
            <option value="">Select a chart...</option>
            {% for chart in charts %}
            <option value="{{ chart['id'] }}">{{ chart['name'] }}</option>
            {% endfor %}
        </select>
    </div>

    <div style="margin-bottom: 8px;">
        <label for="chart_order" style="display: block; margin-bottom: 3px;">Chart Order:</label>
        <input type="number" id="chart_order" name="chart_order" min="1" value="{{ next_chart_order }}" style="padding: 4px 8px; width: 120px;">
    </div>
    <p style="margin-top: 10px; color: #666; font-style: italic; font-size: 0.9em;">Updated by {{ current_user.full_name }} at (auto-set on save)</p>

    <div style="margin-top: 12px;">
        <button type="submit" class="btn btn-primary btn-sm">Create</button>
        <a href="{{ url_for('pattern_charts_list') }}" class="btn btn-secondary btn-sm">Cancel</a>
    </div>
</form>
{% endblock %}
