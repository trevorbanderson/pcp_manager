{% extends "base.html" %}

{% block title %}Edit Yarn Weight{% endblock %}

{% block content %}
<div style="margin-bottom: 15px;">
    <h2 style="margin: 0; display: inline-block;">Edit Yarn Weight</h2>
    <a href="{{ url_for('yarn_weights_list') }}" class="btn btn-secondary" style="float: right;">Back to List</a>
</div>

<form method="POST" enctype="multipart/form-data">
    <div style="display: flex; flex-direction: column; gap: 14px; max-width: 500px;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <label for="symbol" style="width: 180px;">Symbol Image:</label>
                    <input type="file" id="symbol" name="symbol" accept="image/*" style="width: 220px; height: 36px;">
                    {% if yarn_weight.symbol %}
                        <img src="data:image/png;base64,{{ yarn_weight.symbol|b64encode }}" alt="Symbol" style="max-height: 40px; max-width: 40px; margin-left: 10px;">
                    {% endif %}
                </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="weight_name" style="width: 180px;">Weight Name:</label>
            <input type="text" id="weight_name" name="weight_name" value="{{ yarn_weight.weight_name }}" required style="padding: 4px 8px; width: 220px; height: 36px;">
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label style="width: 180px;">Stitches per 4"</label>
            <input type="number" id="lower_stitches_p4inch" name="lower_stitches_p4inch" value="{{ yarn_weight.lower_stitches_p4inch or 0 }}" required style="width: 100px; height: 36px;" placeholder="Lower">
            <span style="width: 40px; text-align: right;">to</span>
            <input type="number" id="upper_stitches_p4inch" name="upper_stitches_p4inch" value="{{ yarn_weight.upper_stitches_p4inch or 0 }}" required style="width: 100px; height: 36px;" placeholder="Upper">
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label style="width: 180px;">Needle Size (mm)</label>
            <input type="number" step="0.01" id="lower_needle_size_mm" name="lower_needle_size_mm" value="{{ yarn_weight.lower_needle_size_mm or 0 }}" required style="width: 100px; height: 36px;" placeholder="Lower">
            <span style="width: 40px; text-align: right;">to</span>
            <input type="number" step="0.01" id="upper_needle_size_mm" name="upper_needle_size_mm" value="{{ yarn_weight.upper_needle_size_mm or 0 }}" required style="width: 100px; height: 36px;" placeholder="Upper">
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label style="width: 180px;">Needle Size (US)</label>
            <input type="number" id="lower_needle_size_us" name="lower_needle_size_us" value="{{ yarn_weight.lower_needle_size_us or 0 }}" required style="width: 100px; height: 36px;" placeholder="Lower">
            <span style="width: 40px; text-align: right;">to</span>
            <input type="number" id="upper_needle_size_us" name="upper_needle_size_us" value="{{ yarn_weight.upper_needle_size_us or 0 }}" required style="width: 100px; height: 36px;" placeholder="Upper">
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label style="width: 180px;">Wraps per Inch</label>
            <input type="number" id="wraps_per_inch_lower" name="wraps_per_inch_lower" value="{{ yarn_weight.wraps_per_inch_lower or 0 }}" required style="width: 100px; height: 36px;" placeholder="Lower">
            <span style="width: 40px; text-align: right;">to</span>
            <input type="number" id="wraps_per_inch_upper" name="wraps_per_inch_upper" value="{{ yarn_weight.wraps_per_inch_upper or 0 }}" required style="width: 100px; height: 36px;" placeholder="Upper">
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="is_active" style="width: 180px;">Is Active:</label>
            <select id="is_active" name="is_active" style="width: 120px; height: 36px;">
                <option value="true" {% if yarn_weight.is_active %}selected{% endif %}>True</option>
                <option value="false" {% if not yarn_weight.is_active %}selected{% endif %}>False</option>
            </select>
        </div>
        <p style="margin-top: 10px; color: #666; font-style: italic; font-size: 0.9em;">Updated by {{ get_full_name(yarn_weight.created_by) }} at {{ yarn_weight.created_at | fmt_dt }}</p>
    </div>
    <div style="margin-top: 18px;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <label for="inexpensive_yarn_type" style="width: 180px;">Inexpensive Yarn Type:</label>
                    <input type="text" id="inexpensive_yarn_type" name="inexpensive_yarn_type" value="{{ yarn_weight.inexpensive_yarn_type or '' }}" style="width: 220px; height: 36px;">
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <label for="mid_range_yarn_type" style="width: 180px;">Mid-Range Yarn Type:</label>
                    <input type="text" id="mid_range_yarn_type" name="mid_range_yarn_type" value="{{ yarn_weight.mid_range_yarn_type or '' }}" style="width: 220px; height: 36px;">
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <label for="premium_yarn_type" style="width: 180px;">Premium Yarn Type:</label>
                    <input type="text" id="premium_yarn_type" name="premium_yarn_type" value="{{ yarn_weight.premium_yarn_type or '' }}" style="width: 220px; height: 36px;">
                </div>
        <button type="submit" class="btn btn-primary btn-sm">Update</button>
        <a href="{{ url_for('yarn_weights_list') }}" class="btn btn-secondary btn-sm">Cancel</a>
    </div>
</form>
{% endblock %}
