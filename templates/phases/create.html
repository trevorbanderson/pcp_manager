{% extends "base.html" %}
{% block title %}Create Phase{% endblock %}
{% block content %}
<div style="margin-bottom: 15px;">
    <h2 style="margin: 0; display: inline-block;">Create Phase</h2>
    <a href="{{ url_for('phases_list') }}" class="btn btn-secondary" style="float: right;">Back to List</a>
</div>
<form method="POST">
    <div style="display: flex; flex-direction: column; gap: 14px; max-width: 700px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="seq" style="width: 180px;">Phase Seq:</label>
            <input type="number" id="seq" name="seq" required style="padding: 4px 8px; width: 220px; height: 36px;">
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="description" style="width: 180px;">Phase Description:</label>
            <input type="text" id="description" name="description" required style="padding: 4px 8px; width: 320px; height: 36px;">
        </div>
        <p style="margin-top: 10px; color: #666; font-style: italic; font-size: 0.9em;">Updated by {{ current_user.full_name }} at (auto-set on save)</p>
    </div>
    <div style="margin-top: 18px;">
        <button type="submit" class="btn btn-primary btn-sm">Create</button>
        <a href="{{ url_for('phases_list') }}" class="btn btn-secondary btn-sm">Cancel</a>
    </div>
</form>
{% endblock %}
