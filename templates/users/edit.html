{% extends 'base.html' %}
{% block title %}Edit User – PCP Pattern Manager{% endblock %}
{% block content %}
<h2>Edit User: {{ user.username }}</h2>
<form method="POST" action="{{ url_for('users_edit', id=user.id) }}" style="max-width:480px;">
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:5px; font-weight:600; font-size:13px;">Username</label>
        <input type="text" value="{{ user.username }}" disabled style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; background:#f5f5f5; box-sizing:border-box;">
        <div style="font-size:11px; color:#888; margin-top:3px;">Username cannot be changed.</div>
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:5px; font-weight:600; font-size:13px;">Full Name *</label>
        <input type="text" name="full_name" required maxlength="100" value="{{ user.full_name or '' }}" style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:5px; font-weight:600; font-size:13px;">Email *</label>
        <input type="email" name="email" required maxlength="150" value="{{ user.email }}" style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:5px; font-weight:600; font-size:13px;">New Password (leave blank to keep current)</label>
        <input type="password" name="new_password" minlength="8" style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px; display:flex; gap:24px;">
        <label style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer;">
            <input type="checkbox" name="is_admin" {% if user.is_admin %}checked{% endif %}> Admin
        </label>
        <label style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer;">
            <input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}> Active
        </label>
    </div>
    <div style="display:flex; gap:10px;">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('users_list') }}" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
