{% extends 'base.html' %}
{% block title %}Create User – PCP Pattern Manager{% endblock %}
{% block content %}
<h2>Create User</h2>
<form method="POST" action="{{ url_for('users_create') }}" style="max-width:480px;">
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:5px; font-weight:600; font-size:13px;">Username *</label>
        <input type="text" name="username" required maxlength="50" style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:5px; font-weight:600; font-size:13px;">Full Name *</label>
        <input type="text" name="full_name" required maxlength="100" style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:5px; font-weight:600; font-size:13px;">Email *</label>
        <input type="email" name="email" required maxlength="150" style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:5px; font-weight:600; font-size:13px;">Password * (min 8 characters)</label>
        <input type="password" name="password" required minlength="8" style="width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
    </div>
    <div style="margin-bottom:20px;">
        <label style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer;">
            <input type="checkbox" name="is_admin"> Grant admin access
        </label>
    </div>
    <div style="display:flex; gap:10px;">
        <button type="submit" class="btn btn-primary">Create User</button>
        <a href="{{ url_for('users_list') }}" class="btn">Cancel</a>
    </div>
</form>
{% endblock %}
