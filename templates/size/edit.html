{% extends "base.html" %}
{% block title %}Edit Size{% endblock %}
{% block content %}
<div class="page-header"><h2>Edit Size</h2></div>
<form method="POST" style="max-width:400px;">
    <div style="margin-bottom:8px;">
        <label for="name">Size Name:</label>
        <input type="text" id="name" name="name" maxlength="50" value="{{ size['name'] }}" style="width:200px;" required>
    </div>
    <div style="margin-bottom:8px;">
        <label for="abbreviation">Abbreviation:</label>
        <input type="text" id="abbreviation" name="abbreviation" maxlength="20" value="{{ size['abbreviation'] }}" style="width:120px;">
    </div>
    <div style="margin-bottom:8px;">
        <label for="seq">Sequence:</label>
        <input type="number" id="seq" name="seq" value="{{ size['seq'] }}" style="width:80px;">
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('size_list') }}" class="btn">Cancel</a>
</form>
{% endblock %}
