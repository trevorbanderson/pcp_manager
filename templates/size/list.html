{% extends "base.html" %}
{% block title %}Sizes{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Sizes</h2>
    <a href="{{ url_for('size_create') }}" class="btn btn-primary">Add New</a>
</div>
<table class="data-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Abbreviation</th>
            <th>Seq</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for size in sizes %}
        <tr>
            <td>{{ size['id'] }}</td>
            <td>{{ size['name'] }}</td>
            <td>{{ size['abbreviation'] }}</td>
            <td>{{ size['seq'] }}</td>
            <td>
                <a href="{{ url_for('size_edit', id=size['id']) }}" class="btn btn-sm">Edit</a>
                <form method="POST" action="{{ url_for('size_delete', id=size['id']) }}" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this size?');">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
