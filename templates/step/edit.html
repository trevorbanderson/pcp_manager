{% extends "base.html" %}
{% block title %}Edit Step{% endblock %}
{% block content %}
<div style="margin-bottom: 15px;">
    <h2 style="margin: 0; display: inline-block;">Edit Step</h2>
    <a href="{{ url_for('step_list') }}" class="btn btn-secondary" style="float: right;">Back to List</a>
</div>
<form method="POST">
    <div style="display: flex; flex-direction: column; gap: 14px; max-width: 700px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="phase_id" style="width: 180px;">Phase:</label>
            <select id="phase_id" name="phase_id" required style="padding: 4px 8px; width: 320px; height: 36px;">
                {% for phase in phases %}
                <option value="{{ phase.id }}" {% if phase.id == step.phase_id %}selected{% endif %}>{{ phase.seq }} - {{ phase.description }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="step_group_id" style="width: 180px;">Group:</label>
            <select id="step_group_id" name="step_group_id" required style="padding: 4px 8px; width: 320px; height: 36px;">
                {% for step_group in step_groups %}
                <option value="{{ step_group.id }}" data-phase-id="{{ step_group.phase_id }}" {% if step_group.id == step.step_group_id %}selected{% endif %}>{{ step_group.seq }} - {{ step_group.description }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="seq" style="width: 180px;">Step Seq:</label>
            <input type="number" id="seq" name="seq" value="{{ step.seq }}" required style="padding: 4px 8px; width: 220px; height: 36px;">
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="description" style="width: 180px;">Step Desc:</label>
            <input type="text" id="description" name="description" value="{{ step.description }}" style="padding: 4px 8px; width: 320px; height: 36px;">
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <label for="step_sql" style="width: 180px;">Step SQL:</label>
            <textarea id="step_sql" name="step_sql" style="padding: 4px 8px; width: 400px; height: 80px;">{{ step.step_sql }}</textarea>
        </div>
        <p style="margin-top: 10px; color: #666; font-style: italic; font-size: 0.9em;">Updated by {{ get_full_name(step.created_by) }} at {{ step.created_at | fmt_dt }}</p>
    </div>
    <div style="margin-top: 18px;">
        <button type="submit" class="btn btn-primary btn-sm">Update</button>
        <a href="{{ url_for('step_list') }}" class="btn btn-secondary btn-sm">Cancel</a>
    </div>
</form>
<script>
(function () {
    const phaseSelect = document.getElementById('phase_id');
    const groupSelect = document.getElementById('step_group_id');

    function filterGroups() {
        const phaseId = phaseSelect.value;
        Array.from(groupSelect.options).forEach((option) => {
            option.hidden = option.dataset.phaseId !== phaseId;
        });

        const selected = groupSelect.options[groupSelect.selectedIndex];
        if (!selected || selected.hidden) {
            groupSelect.value = '';
        }
    }

    phaseSelect.addEventListener('change', filterGroups);
    filterGroups();
})();
</script>
{% endblock %}
