pool:
  vmImage: 'ubuntu-latest'

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'
      - '.env'
      - 'logs/**'

variables:
  azureSubscriptionDev:  'AgileInnovationsARMConnection'
  azureSubscriptionProd: 'AgileInnovationsARMConnectionPROD'
  location:              'eastus2'
  registryName:          'agileinnovations'
  containerRegistry:     'agileinnovations.azurecr.io'
  imageName:             'pcp-manager'
  keyVaultName:          'AKV-AgileInnovations-Dev'
  envName:               'pcp-containers'
  devResourceGroup:      'Dev'
  prodResourceGroup:     'Prod'
  dbHost:                'pcpdb.postgres.database.azure.com'
  dbServerName:          'pcpdb'
  dbUser:                'pgadmin'
  dbName:                'pcp'

stages:

# ── 1. Test ───────────────────────────────────────────────────────────────
- stage: Test
  displayName: 'Run Test Suite'
  jobs:
  - job: RunTests
    displayName: 'pytest + coverage'
    steps:
    - checkout: self

    - task: UsePythonVersion@0
      displayName: 'Use Python 3.12'
      inputs:
        versionSpec: '3.12'
        addToPath: true

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
      displayName: 'Install dependencies'

    - script: |
        pytest tests/ \
          --junitxml=$(Build.ArtifactStagingDirectory)/test-results.xml \
          --cov=. \
          --cov-report=xml:$(Build.ArtifactStagingDirectory)/coverage.xml \
          --cov-report=term-missing \
          -v
      displayName: 'Run pytest'
      env:
        ENVIRONMENT:             'dev'
        WEB_SECRET:              'test-secret-pipeline'
        AZURE_KEY_VAULT_URL:     ''
        USE_MANAGED_IDENTITY:    'false'
        DB_HOST:                 'localhost'
        DB_PORT:                 '5432'
        DB_NAME:                 'testdb'
        DB_USER:                 'testuser'
        DB_SSLMODE:              'disable'
        MAIL_SERVER:             'localhost'
        MAIL_PORT:               '25'
        MAIL_USERNAME:           'test@test.com'

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Build.ArtifactStagingDirectory)/test-results.xml'
        failTaskOnFailedTests: true

    - task: PublishCodeCoverageResults@2
      displayName: 'Publish coverage'
      condition: always()
      inputs:
        summaryFileLocation: '$(Build.ArtifactStagingDirectory)/coverage.xml'

# ── 2. Static Analysis & Security ───────────────────────────────────────
- stage: Lint
  displayName: 'Static Analysis & Security'
  dependsOn: Test
  jobs:
  - job: Analyse
    displayName: 'ruff + bandit + pip-audit'
    steps:
    - checkout: self

    - task: UsePythonVersion@0
      displayName: 'Use Python 3.12'
      inputs:
        versionSpec: '3.12'
        addToPath: true

    - script: |
        python -m pip install --upgrade pip
        pip install ruff bandit pip-audit
      displayName: 'Install analysis tools'

    - script: ruff check .
      displayName: 'ruff – lint (pyflakes, pycodestyle, bugbear, isort)'

    - script: |
        bandit -r app.py config.py database.py set_env.py pcp_logger.py \
          -ll --format txt
      displayName: 'bandit – security scan (medium+ severity)'

    - script: pip-audit -r requirements.txt
      displayName: 'pip-audit – dependency CVE scan'

# ── 3. Build & push Docker image ───────────────────────────────────────
- stage: Build
  displayName: 'Build & Push Image'
  dependsOn: Lint
  jobs:
  - job: BuildImage
    displayName: 'ACR remote build + push'
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'az acr build → $(imageName):$(Build.BuildId)'
      inputs:
        azureSubscription: '$(azureSubscriptionDev)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e
          # Use absolute paths so ACR picks up the correct Dockerfile regardless of cwd
          az acr build \
            --registry $(registryName) \
            --image $(imageName):$(Build.BuildId) \
            --image $(imageName):latest \
            --file $(Build.SourcesDirectory)/Dockerfile \
            $(Build.SourcesDirectory)

# ── 4. Deploy to Staging ──────────────────────────────────────────────────
- stage: Staging
  displayName: 'Deploy to Staging'
  dependsOn: Build
  jobs:
  - job: DeployStaging
    displayName: 'Bicep deploy → Dev resource group'
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Run DB migrations (staging)'
      inputs:
        azureSubscription: '$(azureSubscriptionDev)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e
          JOB_NAME="pcp-db-migrate"
          RG="$(devResourceGroup)"
          IMAGE="$(containerRegistry)/$(imageName):$(Build.BuildId)"

          echo "Updating migration job image to $IMAGE..."
          az containerapp job update \
            --name "$JOB_NAME" \
            --resource-group "$RG" \
            --image "$IMAGE"

          echo "Starting migration job execution..."
          EXECUTION=$(az containerapp job start \
            --name "$JOB_NAME" \
            --resource-group "$RG" \
            --query name -o tsv)
          echo "Execution name: $EXECUTION"

          echo "Polling for completion..."
          DEADLINE=$(( $(date +%s) + 600 ))
          while true; do
            STATUS=$(az containerapp job execution show \
              --name "$JOB_NAME" \
              --resource-group "$RG" \
              --job-execution-name "$EXECUTION" \
              --query properties.status -o tsv 2>/dev/null || echo "Running")
            echo "  [$(date +%H:%M:%S)] $STATUS"
            if [[ "$STATUS" == "Succeeded" ]]; then
              echo "Migrations succeeded."; break
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Stopped" || "$STATUS" == "Degraded" ]]; then
              echo "Migration job $STATUS."; exit 1
            fi
            if (( $(date +%s) > DEADLINE )); then
              echo "Timed out (10 min) waiting for migration job."; exit 1
            fi
            sleep 15
          done

    - task: AzureCLI@2
      displayName: 'az deployment group create (staging)'
      inputs:
        azureSubscription: '$(azureSubscriptionDev)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e
          REGISTRY_PASSWORD=$(az acr credential show \
            --name $(registryName) \
            --query passwords[0].value -o tsv)

          az deployment group create \
            --resource-group $(devResourceGroup) \
            --name pcp-manager \
            --template-file $(Build.SourcesDirectory)/bicep/pcp-manager.bicep \
            --parameters \
                location="$(location)" \
                envName="$(envName)" \
                environment="staging" \
                imageTag="$(Build.BuildId)" \
                appVersion="$(Build.BuildId)" \
                keyVaultName="$(keyVaultName)" \
                dbHost="$(dbHost)" \
                registryPassword="$REGISTRY_PASSWORD"

          # Read principal ID directly from the container app (reliable — avoids
          # deployment-output race where the name may not match expectations)
          PRINCIPAL_ID=$(az containerapp show \
            --name pcp-manager \
            --resource-group $(devResourceGroup) \
            --query identity.principalId -o tsv)

          if [ -z "$PRINCIPAL_ID" ]; then
            echo "ERROR: Could not retrieve managed identity principal ID for pcp-manager"
            exit 1
          fi

          echo "Assigning Key Vault Secrets User to principal: $PRINCIPAL_ID"
          KV_ID=$(az keyvault show --name $(keyVaultName) --query id -o tsv)

          az role assignment create \
            --assignee-object-id "$PRINCIPAL_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Key Vault Secrets User" \
            --scope "$KV_ID" 2>/dev/null || echo "Role assignment already exists, skipping"

# ── 5. Manual approval gate ───────────────────────────────────────────────
- stage: ManualApproval
  displayName: 'Manual Approval Before Prod'
  dependsOn: Staging
  jobs:
  - job: WaitForApproval
    displayName: 'Wait for approval'
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 60
      inputs:
        notifyUsers: ''
        instructions: 'Staging looks good? Approve to deploy pcp-manager to Production.'

# ── 6. Deploy to Prod ─────────────────────────────────────────────────────
- stage: Prod
  displayName: 'Deploy to Prod'
  dependsOn: ManualApproval
  jobs:
  - job: DeployProd
    displayName: 'Bicep deploy → Prod resource group'
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: 'Run DB migrations (prod)'
      inputs:
        azureSubscription: '$(azureSubscriptionProd)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e
          JOB_NAME="pcp-db-migrate"
          RG="$(prodResourceGroup)"
          IMAGE="$(containerRegistry)/$(imageName):$(Build.BuildId)"

          echo "Updating migration job image to $IMAGE..."
          az containerapp job update \
            --name "$JOB_NAME" \
            --resource-group "$RG" \
            --image "$IMAGE"

          echo "Starting migration job execution..."
          EXECUTION=$(az containerapp job start \
            --name "$JOB_NAME" \
            --resource-group "$RG" \
            --query name -o tsv)
          echo "Execution name: $EXECUTION"

          echo "Polling for completion..."
          DEADLINE=$(( $(date +%s) + 600 ))
          while true; do
            STATUS=$(az containerapp job execution show \
              --name "$JOB_NAME" \
              --resource-group "$RG" \
              --job-execution-name "$EXECUTION" \
              --query properties.status -o tsv 2>/dev/null || echo "Running")
            echo "  [$(date +%H:%M:%S)] $STATUS"
            if [[ "$STATUS" == "Succeeded" ]]; then
              echo "Migrations succeeded."; break
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Stopped" || "$STATUS" == "Degraded" ]]; then
              echo "Migration job $STATUS."; exit 1
            fi
            if (( $(date +%s) > DEADLINE )); then
              echo "Timed out (10 min) waiting for migration job."; exit 1
            fi
            sleep 15
          done

    - task: AzureCLI@2
      displayName: 'az deployment group create (prod)'
      inputs:
        azureSubscription: '$(azureSubscriptionProd)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -e
          REGISTRY_PASSWORD=$(az acr credential show \
            --name $(registryName) \
            --query passwords[0].value -o tsv)

          az deployment group create \
            --resource-group $(prodResourceGroup) \
            --name pcp-manager \
            --template-file $(Build.SourcesDirectory)/bicep/pcp-manager.bicep \
            --parameters \
                location="$(location)" \
                envName="$(envName)" \
                environment="prod" \
                imageTag="$(Build.BuildId)" \
                appVersion="$(Build.BuildId)" \
                keyVaultName="$(keyVaultName)" \
                dbHost="$(dbHost)" \
                registryPassword="$REGISTRY_PASSWORD"

          # Read principal ID directly from the container app (reliable — avoids
          # deployment-output race where the name may not match expectations)
          PRINCIPAL_ID=$(az containerapp show \
            --name pcp-manager \
            --resource-group $(prodResourceGroup) \
            --query identity.principalId -o tsv)

          if [ -z "$PRINCIPAL_ID" ]; then
            echo "ERROR: Could not retrieve managed identity principal ID for pcp-manager"
            exit 1
          fi

          echo "Assigning Key Vault Secrets User to principal: $PRINCIPAL_ID"
          KV_ID=$(az keyvault show --name $(keyVaultName) --query id -o tsv)

          az role assignment create \
            --assignee-object-id "$PRINCIPAL_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Key Vault Secrets User" \
            --scope "$KV_ID" 2>/dev/null || echo "Role assignment already exists, skipping"
